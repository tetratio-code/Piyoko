<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>小雞棋</title>
<style>
:root{
  --cell:56px;
  --gap:6px;
  --page-bg:#0f1a14;
  --panel-bg:rgba(255,255,255,0.04);
  --board-bg:#768f5d;
  --text:#e5e7eb;
  --muted:#94a3b8;
}
body{
  margin:0;padding:18px;
  background:var(--page-bg);
  color:var(--text);
  font-family:ui-sans-serif,system-ui;
}
.wrap{display:flex;gap:18px;flex-wrap:wrap}
.panel{
  min-width:360px;
  background:var(--panel-bg);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:14px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(12,var(--cell));
  grid-template-rows:repeat(12,var(--cell));
  gap:var(--gap);
  background:var(--board-bg);
  padding:var(--gap);
  border-radius:12px;
}
.cell{
  background:rgba(255,255,255,0.05);
  border-radius:8px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
}
.piece{
  width:calc(var(--cell) - 18px);
  height:calc(var(--cell) - 18px);
  margin-top:9px;
  border-radius:10px;
}
.black{background:#111}
.white{background:#eee}
.debugBox{
  margin-top:10px;
  padding:10px;
  background:rgba(0,0,0,0.3);
  max-height:260px;
  overflow:auto;
  font-size:12px;
  white-space:pre-wrap;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="grid" id="grid"></div>
  <div class="panel">
    <select id="modeSel">
      <option value="hh">雙方人類</option>
      <option value="aa">雙方 AI</option>
    </select>
    <button id="btnReset">Reset</button>
    <div id="debug" class="debugBox"></div>
  </div>
</div>

<script>
(()=>{
const W=12,H=12;
const POINTS_PER_TURN=6;
const SEARCH_DEPTH=6;
const WIN=1e9;

const board=Array.from({length:W+1},()=>Array(H+1).fill(null));
const gridEl=document.getElementById("grid");
const debugEl=document.getElementById("debug");
let turn='B';
let aiBlack=false,aiWhite=false;
let isAnimating=false;

function debug(msg){
  debugEl.textContent+=msg+"\n";
  debugEl.scrollTop=debugEl.scrollHeight;
}

function otherOf(c){return c==='B'?'W':'B';}
function isAI(c){return (c==='B'&&aiBlack)||(c==='W'&&aiWhite);}

function clearBoard(){
  for(let x=1;x<=W;x++)
    for(let y=1;y<=H;y++)
      board[x][y]=null;
}
function placeInitial(){
  [[1,1],[1,2],[1,3],[2,1],[2,2],[3,1]].forEach(p=>board[p[0]][p[1]]='B');
  [[12,1],[12,2],[12,3],[11,1],[11,2],[10,1]].forEach(p=>board[p[0]][p[1]]='W');
}

function render(){
  gridEl.innerHTML="";
  for(let y=H;y>=1;y--){
    for(let x=1;x<=W;x++){
      const d=document.createElement("div");
      d.className="cell";
      const v=board[x][y];
      if(v){
        const p=document.createElement("div");
        p.className="piece "+(v==='B'?'black':'white');
        d.appendChild(p);
      }
      gridEl.appendChild(d);
    }
  }
}

function playerHasPieces(color){
  for(let x=1;x<=W;x++)
    for(let y=1;y<=H;y++)
      if(board[x][y]===color) return true;
  return false;
}

function evaluateBoard(b){
  let s=0;
  for(let x=1;x<=W;x++)
    for(let y=1;y<=H;y++){
      if(b[x][y]==='B') s+=x+y;
      if(b[x][y]==='W') s-=(W+1-x)+y;
    }
  return s;
}

function deepCopy(b){return b.map(c=>c.slice());}

function listLegalMoves(b,color){
  const moves=[];
  for(let x=1;x<=W;x++)
    for(let y=1;y<=H;y++)
      if(b[x][y]===color)
        moves.push({x,y,sim:{b:deepCopy(b),nextTurn:otherOf(color)}});
  return moves;
}

function alphabeta(b,turnColor,depth,alpha,beta){
  const bHas=playerHasPieces('B');
  const wHas=playerHasPieces('W');
  if(!bHas&&wHas) return WIN+depth;
  if(!wHas&&bHas) return -WIN-depth;
  if(depth===0) return evaluateBoard(b);

  const moves=listLegalMoves(b,turnColor);
  if(moves.length===0)
    return alphabeta(b,otherOf(turnColor),depth-1,alpha,beta);

  const isMax=(turnColor==='B');
  let best=isMax?-Infinity:Infinity;

  for(const m of moves){
    const v=alphabeta(m.sim.b,m.sim.nextTurn,depth-1,alpha,beta);
    if(isMax){
      if(v>best) best=v;
      alpha=Math.max(alpha,best);
    }else{
      if(v<best) best=v;
      beta=Math.min(beta,best);
    }
    if(alpha>=beta) break;
  }
  return best;
}

function pickBestAIMove(){
  const moves=listLegalMoves(board,turn);
  debug("legalMoves="+moves.length);
  if(moves.length===0) return null;

  const isMax=(turn==='B');
  let alpha=-Infinity,beta=Infinity;

  let bestMove=moves[0];
  let bestVal=alphabeta(bestMove.sim.b,bestMove.sim.nextTurn,SEARCH_DEPTH-1,alpha,beta);

  for(let i=1;i<moves.length;i++){
    const m=moves[i];
    const v=alphabeta(m.sim.b,m.sim.nextTurn,SEARCH_DEPTH-1,alpha,beta);
    if(isMax&&v>bestVal){bestVal=v;bestMove=m;}
    if(!isMax&&v<bestVal){bestVal=v;bestMove=m;}
  }
  debug("AI best="+bestVal);
  return bestMove;
}

async function maybeAIMove(){
  if(!isAI(turn)) return;
  if(!playerHasPieces('B')||!playerHasPieces('W')) return;

  const mv=pickBestAIMove();
  debug("after pickBestAIMove: "+(mv?mv.x+","+mv.y:"null"));
  if(!mv){turn=otherOf(turn);return;}
  turn=otherOf(turn);
  render();
  setTimeout(maybeAIMove,50);
}

document.getElementById("modeSel").onchange=e=>{
  aiBlack=aiWhite=(e.target.value==='aa');
  maybeAIMove();
};

document.getElementById("btnReset").onclick=()=>{
  clearBoard();
  placeInitial();
  turn='B';
  render();
  debug("RESET");
  maybeAIMove();
};

clearBoard();
placeInitial();
render();
})();
</script>
</body>
</html>
