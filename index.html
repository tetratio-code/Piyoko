<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>小雞棋</title>
  <style>
    :root{
      --cell: 56px;
      --gap: 6px;

      --page-bg: #0f1a14;
      --panel-bg: rgba(255,255,255,0.04);

      --board-bg: #768f5d;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    body{
      margin:0; padding:18px;
      background: var(--page-bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", Arial;
    }

    .wrap{
      display:flex; gap:18px; flex-wrap:wrap;
      align-items:flex-start;
    }

    .panel{
      min-width: 360px;
      background: var(--panel-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 14px 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .title{
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .6px;
      margin-bottom: 10px;
    }

    .row{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
      margin: 8px 0;
    }

    button, select, input[type="range"]{
      background: rgba(56,189,248,0.15);
      border: 1px solid rgba(56,189,248,0.35);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    select{
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      cursor: default;
      font-weight: 650;
    }

    input[type="range"]{
      padding: 0;
      height: 32px;
      width: 170px;
      cursor: pointer;
    }

    .hint{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
      white-space: pre-wrap;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      color: var(--text);
      font-weight: 900;
    }
    .dot{
      width:10px; height:10px; border-radius:999px;
      background:#94a3b8;
      box-shadow: 0 0 0 3px rgba(148,163,184,0.15);
    }
    .dot.black{ background:#0b1220; box-shadow:0 0 0 3px rgba(11,18,32,0.35); }
    .dot.white{ background:#e5e7eb; box-shadow:0 0 0 3px rgba(229,231,235,0.20); }

    .board{
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, var(--cell));
      grid-template-rows: repeat(12, var(--cell));
      gap: var(--gap);
      background: var(--board-bg);
      padding: var(--gap);
      border-radius: 12px;
    }

    .cell{
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      position: relative;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .cell::after{
      content: attr(data-xy);
      position:absolute;
      left:6px; top:6px;
      font-size: 10px;
      color: rgba(148,163,184,0.35);
      pointer-events:none;
    }

    .piece{
      width: calc(var(--cell) - 18px);
      height: calc(var(--cell) - 18px);
      border-radius: 10px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.35);
      margin-top: 9px;
    }

    .black{
      background: radial-gradient(circle at 30% 30%, rgba(40,55,70,1), rgba(6,10,16,1) 70%);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .white{
      background: #e5e7eb;
      border: 1px solid rgba(0,0,0,0.10);
    }

    .selOutline{
      outline: 3px solid rgba(56,189,248,0.85);
      outline-offset: -3px;
    }
    .grpGlow{
      box-shadow: 0 0 0 3px rgba(56,189,248,0.35) inset;
    }

    /* 棋譜 */
    .movesTitle{
      margin-top: 12px;
      font-size: 12px;
      font-weight: 900;
      color: var(--text);
      opacity: .9;
      letter-spacing: .2px;
    }
    .movesBox{
      margin-top: 6px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
      color: rgba(229,231,235,0.92);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      max-height: 320px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="board">
    <div id="grid" class="grid"></div>
  </div>

  <div class="panel">
    <div class="title">小雞棋v2.0debug</div>

    <div class="row">
      <span id="turnBadge" class="badge"><span class="dot"></span><span id="turnText">回合</span></span>
    </div>

    <div class="row">
      <label style="font-size:12px;color:var(--muted);font-weight:900;">對戰模式</label>
      <select id="modeSel" title="對戰模式">
        <option value="hh">雙方人類</option>
        <option value="ab">AI 執黑</option>
        <option value="aw">AI 執白</option>
        <option value="aa">雙方 AI</option>
      </select>
    </div>

    <div class="row" style="align-items:center;">
      <label style="font-size:12px;color:var(--muted);font-weight:900;">搜索深度</label>
      <input id="depthRange" type="range" min="1" max="12" step="1" value="6" />
      <span id="depthBadge" class="badge" title="Alpha-Beta 搜索深度">深度：6</span>
    </div>

    <div class="row">
      <button id="btnReset">Reset</button>
      <button id="btnClearMoves" title="清空棋譜（不影響盤面）">Clear Moves</button>
    </div>

    <div id="log" class="hint"></div>

    <div class="movesTitle">棋譜／AI分析（累積）</div>
    <div id="moves" class="movesBox"></div>
  </div>
</div>

<script>
(() => {
  const STEP_DELAY = 100;
  const AI_THINK_DELAY = 150;

  const W = 12;
  const H = 12;
  const POINTS_PER_TURN = 6;

  let SEARCH_DEPTH = 6; // slider 可調

  const INITIAL_PIECES_PER_SIDE = 6;
  const WIN = 1e9;

  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

  const board = Array.from({length: W+1}, ()=>Array(H+1).fill(null));

  const gridEl = document.getElementById('grid');
  const logEl = document.getElementById('log');
  const movesEl = document.getElementById('moves');
  const turnBadgeEl = document.getElementById('turnBadge');
  const turnTextEl = document.getElementById('turnText');
  const modeSel = document.getElementById('modeSel');

  const depthRange = document.getElementById('depthRange');
  const depthBadge = document.getElementById('depthBadge');

  let turn='B';
  let selected=null;
  let group=null;
  let isAnimating=false;

  let aiBlack=false;
  let aiWhite=false;

  let lastMover = 'B';

  function dirOf(c){ return c==='B'?1:-1; }
  function otherOf(c){ return c==='B'?'W':'B'; }
  function isAI(color){ return (color==='B' && aiBlack) || (color==='W' && aiWhite); }

  function log(msg){ logEl.textContent = msg || ''; }

  function appendMoveLine(line){
    movesEl.textContent += (movesEl.textContent ? "\n" : "") + line;
    movesEl.scrollTop = movesEl.scrollHeight;
    const lines = movesEl.textContent.split("\n");
    if(lines.length > 8000){
      movesEl.textContent = lines.slice(lines.length - 6000).join("\n");
    }
  }

  function fmtScore(v){
    if(v === Infinity) return "Inf";
    if(v === -Infinity) return "-Inf";
    if(v >  9e8) return `WIN(+${Math.round(v - WIN)})`;   // WIN+depth
    if(v < -9e8) return `LOSE(${Math.round(v + WIN)})`;   // -WIN-depth
    return String(Math.round(v));
  }

  function updateTurnUI(){
    const dot = turnBadgeEl.querySelector('.dot');
    dot.className = 'dot ' + (turn==='B'?'black':'white');
    const side = (turn==='B'?'黑棋':'白棋');
    const aiTag = isAI(turn) ? '（AI）' : '（人類）';
    turnTextEl.textContent = `現在回合：${side}${aiTag}`;
  }

  function render(){
    gridEl.innerHTML='';
    for(let y=H;y>=1;y--){
      for(let x=1;x<=W;x++){
        const d=document.createElement('div');
        d.className='cell';
        d.dataset.x=x;
        d.dataset.y=y;
        d.setAttribute('data-xy',`${x},${y}`);

        const v=board[x][y];
        if(v){
          const p=document.createElement('div');
          p.className='piece '+(v==='B'?'black':'white');
          if(group && group.x===x && group.ys.includes(y)) p.classList.add('grpGlow');
          d.appendChild(p);
        }

        if(selected && selected.x===x && selected.y===y) d.classList.add('selOutline');

        gridEl.appendChild(d);
      }
    }
    updateTurnUI();
  }

  function deepCopyBoard(src){ return src.map(col => col.slice()); }

  function clearBoard(b = board){
    for(let x=1;x<=W;x++) for(let y=1;y<=H;y++) b[x][y]=null;
  }

  function placeInitial(b = board){
    // 你現在用來測循環的局面
    const blacks=[[7,1],[8,2]];
    const whites=[[7,2],[7,3],[8,1]];

    // 原始開局（需要就換回來）
    // const blacks=[[1,1],[1,2],[1,3],[2,1],[2,2],[3,1]];
    // const whites=[[12,1],[12,2],[12,3],[11,1],[11,2],[10,1]];

    blacks.forEach(([x,y])=>b[x][y]='B');
    whites.forEach(([x,y])=>b[x][y]='W');
  }

  // ===== 規則核心 =====
  function computeGroupOn(b, x,y){
    const moverColor=b[x][y];
    if(!moverColor) return null;
    const ys=[];
    for(let yy=y;yy<=H;yy++){
      if(b[x][yy]!==null) ys.push(yy);
      else break;
    }
    return {x,ys,moverColor};
  }
  function computeGroup(x,y){ return computeGroupOn(board, x, y); }

  function countAllAboveOn(b, x,y){
    let c=0;
    for(let yy=y+1;yy<=H;yy++){
      if(b[x][yy]===null) break;
      c++;
    }
    return c;
  }
  function countAllAbove(x,y){ return countAllAboveOn(board, x, y); }

  function moveUpStepOn(b, g){
    const top=g.ys[g.ys.length-1];
    if(top>=H) return false;
    if(b[g.x][top+1]!==null) return false;
    for(let i=g.ys.length-1;i>=0;i--){
      const yy=g.ys[i];
      b[g.x][yy+1]=b[g.x][yy];
      b[g.x][yy]=null;
      g.ys[i]=yy+1;
    }
    return true;
  }
  function moveUpStep(g){ return moveUpStepOn(board, g); }

  function belowOccupiedOrGroundOn(b, g){
    const bottom=g.ys[0];
    if(bottom===1) return true;
    return b[g.x][bottom-1]!==null;
  }
  function belowOccupiedOrGround(g){ return belowOccupiedOrGroundOn(board, g); }

  function canMoveDownOn(b, g){
    const bottom=g.ys[0];
    if(bottom===1) return false;
    return b[g.x][bottom-1]===null;
  }
  function canMoveDown(g){ return canMoveDownOn(board, g); }

  function moveDown1On(b, g){
    for(let i=0;i<g.ys.length;i++){
      const yy=g.ys[i];
      b[g.x][yy-1]=b[g.x][yy];
      b[g.x][yy]=null;
      g.ys[i]=yy-1;
    }
  }
  function moveDown1(g){ return moveDown1On(board, g); }

  function frontBlockedOn(b, g){
    const nx = g.x + dirOf(g.moverColor);
    if(nx<1 || nx>W) return false;
    for(const yy of g.ys){
      const fy = yy - 1;
      if(fy < 1) continue;
      if(b[nx][fy] !== null) return true;
    }
    return false;
  }
  function frontBlocked(g){ return frontBlockedOn(board, g); }

  function moveForward1On(b, g){
    const nx = g.x + dirOf(g.moverColor);

    if(nx < 1 || nx > W){
      const removed = {B:0, W:0};
      for(const yy of g.ys){
        const c = b[g.x][yy];
        if(c === 'B') removed.B++;
        if(c === 'W') removed.W++;
        b[g.x][yy] = null;
      }
      g.x = nx;
      return { borneOff:true, removed, blocked:false, moved:true };
    }

    for(const yy of g.ys){
      if(b[nx][yy] !== null){
        return { borneOff:false, removed:{B:0, W:0}, blocked:true, moved:false };
      }
    }

    for(const yy of g.ys) b[nx][yy] = b[g.x][yy];
    for(const yy of g.ys) b[g.x][yy] = null;
    g.x = nx;

    return { borneOff:false, removed:{B:0, W:0}, blocked:false, moved:true };
  }
  function moveForward1(g){ return moveForward1On(board, g); }

  function playerHasPiecesOn(b, color){
    for(let x=1;x<=W;x++){
      for(let y=1;y<=H;y++){
        if(b[x][y] === color) return true;
      }
    }
    return false;
  }
  function playerHasPieces(color){ return playerHasPiecesOn(board, color); }

  // ===== 終局判定 =====
  function checkGameOver(showAlert = false, moverColor = null){
    const bHas = playerHasPieces('B');
    const wHas = playerHasPieces('W');

    if(!bHas && wHas){
      if(showAlert) alert('黑棋勝利！');
      return { over:true, winner:'B' };
    }
    if(!wHas && bHas){
      if(showAlert) alert('白棋勝利！');
      return { over:true, winner:'W' };
    }
    if(!bHas && !wHas){
      const w = moverColor || lastMover || 'B';
      if(showAlert) alert(`${w==='B'?'黑棋':'白棋'}勝利！`);
      return { over:true, winner:w };
    }
    return { over:false, winner:null };
  }

  // ===== 重生/下落 =====
  async function dropPieceAt(x, y){
    while(y>1 && board[x][y-1]===null){
      board[x][y-1] = board[x][y];
      board[x][y] = null;
      y = y-1;
      render();
      await sleep(STEP_DELAY);
    }
  }

  async function respawnAndDrop(color, count){
    if(count<=0) return;
    const spawnX = (color==='B') ? 1 : 12;
    for(let k=0; k<count; k++){
      let targetY = H - k;
      while(targetY >= 1 && board[spawnX][targetY] !== null) targetY--;
      if(targetY < 1) break;

      board[spawnX][targetY] = color;
      render();
      await sleep(STEP_DELAY);
      await dropPieceAt(spawnX, targetY);
    }
  }

  function respawnDropSim(b, color, count){
    if(count<=0) return;
    const spawnX = (color==='B') ? 1 : 12;

    for(let k=0; k<count; k++){
      let y = H - k;
      while(y >= 1 && b[spawnX][y] !== null) y--;
      if(y < 1) break;

      b[spawnX][y] = color;
      while(y > 1 && b[spawnX][y-1] === null){
        b[spawnX][y-1] = b[spawnX][y];
        b[spawnX][y] = null;
        y--;
      }
    }
  }

  // ===== 評值 =====
  function evaluateBoard(b){
    let blackOn = 0, whiteOn = 0;
    let blackScore = 0, whiteScore = 0;

    for(let x=1;x<=W;x++){
      for(let y=1;y<=H;y++){
        const v = b[x][y];
        if(v === 'B'){
          blackOn++;
          blackScore += Math.min(14, x + y);
        } else if(v === 'W'){
          whiteOn++;
          const mirroredX = (W + 1) - x;
          whiteScore += Math.min(14, mirroredX + y);
        }
      }
    }

    const blackOff = INITIAL_PIECES_PER_SIDE - blackOn;
    const whiteOff = INITIAL_PIECES_PER_SIDE - whiteOn;
    blackScore += 14 * Math.max(0, blackOff);
    whiteScore += 14 * Math.max(0, whiteOff);

    return blackScore - whiteScore;
  }

  // ===== 模擬走子 =====
  function simulateMoveFrom(b0, x, y, turnColor){
    if(b0[x][y] !== turnColor) return { ok:false };

    const b = deepCopyBoard(b0);
    const g = computeGroupOn(b, x, y);
    if(!g) return { ok:false };

    const above = countAllAboveOn(b, x, y);
    const moveAmount = Math.floor(POINTS_PER_TURN / (above + 1));

    let didMove = false;

    for(let i=0;i<moveAmount;i++){
      if(moveUpStepOn(b, g)) didMove = true;
      else break;
    }

    let carriedOut = {B:0, W:0};
    let safety = 0;

    while(safety++ < 3000){
      if(frontBlockedOn(b, g)){
        while(canMoveDownOn(b, g)){
          moveDown1On(b, g);
          didMove = true;
        }
        break;
      }

      const res = moveForward1On(b, g);
      if(res.moved) didMove = true;

      carriedOut.B += res.removed.B;
      carriedOut.W += res.removed.W;

      if(res.blocked) break;
      if(res.borneOff) break;

      if(!belowOccupiedOrGroundOn(b, g)){
        moveDown1On(b, g);
        didMove = true;
      }

      if(belowOccupiedOrGroundOn(b, g)) break;
    }

    const bHas = playerHasPiecesOn(b, 'B');
    const wHas = playerHasPiecesOn(b, 'W');
    if(!bHas || !wHas){
      let winner = null;
      if(!bHas && wHas) winner = 'B';
      else if(!wHas && bHas) winner = 'W';
      else winner = turnColor; // 兩邊都沒棋子：以最後行動者勝（你現在的規則）
      return { ok:true, b, nextTurn: turnColor, winner, carriedOutOpponent: 0, changed: didMove };
    }

    const opponent = otherOf(turnColor);
    const carriedOutOpponent = (opponent==='B') ? carriedOut.B : carriedOut.W;

    if(carriedOutOpponent > 0){
      respawnDropSim(b, opponent, carriedOutOpponent);
      return { ok:true, b, nextTurn: turnColor, carriedOutOpponent, changed: true };
    }

    return { ok:true, b, nextTurn: opponent, carriedOutOpponent: 0, changed: didMove };
  }

  function listLegalMoves(b, turnColor){
    const moves = [];
    for(let x=1;x<=W;x++){
      for(let y=1;y<=H;y++){
        if(b[x][y] !== turnColor) continue;
        const sim = simulateMoveFrom(b, x, y, turnColor);
        if(sim.ok && sim.changed) moves.push({ x, y, sim });
      }
    }
    return moves;
  }

  // ===== Alpha-Beta（修正版 TT：EXACT/LOWER/UPPER）=====
  const TT = new Map();

  function boardKey(b, turnColor, depth){
    let s = turnColor + '|' + depth + '|';
    for(let y=1;y<=H;y++){
      for(let x=1;x<=W;x++){
        const v = b[x][y];
        s += (v ? v : '.');
      }
      s += '/';
    }
    return s;
  }

  function alphabeta(b, turnColor, depth, alpha, beta){
    const blackHas = playerHasPiecesOn(b, 'B');
    const whiteHas = playerHasPiecesOn(b, 'W');

    // 終局（以「自己棋子全出界即勝」的規則：黑沒棋=黑勝 => 對黑正分）
    if(!blackHas && whiteHas) return (WIN + depth);
    if(!whiteHas && blackHas) return (-WIN - depth);
    if(!blackHas && !whiteHas) return 0;

    if(depth === 0) return evaluateBoard(b);

    const alpha0 = alpha, beta0 = beta;
    const key = boardKey(b, turnColor, depth);
    const hit = TT.get(key);

    // Probe
    if(hit){
      if(hit.flag === 'EXACT'){
        return hit.value;
      } else if(hit.flag === 'LOWER'){ // value 是下界
        alpha = Math.max(alpha, hit.value);
      } else if(hit.flag === 'UPPER'){ // value 是上界
        beta = Math.min(beta, hit.value);
      }
      if(alpha >= beta) return hit.value;
    }

    const moves = listLegalMoves(b, turnColor);

    // PASS：沒得走就換手（消耗深度）
    if(moves.length === 0){
      const v = alphabeta(b, otherOf(turnColor), depth - 1, alpha, beta);
      // PASS 的節點也可以存 EXACT
      TT.set(key, { value: v, flag: 'EXACT' });
      return v;
    }

    const isMax = (turnColor === 'B');

    // ordering（可留可不留）
    for(const m of moves) m.order = evaluateBoard(m.sim.b);
    moves.sort((a,b2) => isMax ? (b2.order - a.order) : (a.order - b2.order));

    let best = isMax ? -Infinity : Infinity;

    for(const m of moves){
      const v = alphabeta(m.sim.b, m.sim.nextTurn, depth - 1, alpha, beta);

      if(isMax){
        if(v > best) best = v;
        alpha = Math.max(alpha, best);
        if(alpha >= beta) break;
      } else {
        if(v < best) best = v;
        beta = Math.min(beta, best);
        if(alpha >= beta) break;
      }
    }

    // Store：用原始窗格 alpha0/beta0 決定旗標
    let flag = 'EXACT';
    if(best <= alpha0) flag = 'UPPER';
    else if(best >= beta0) flag = 'LOWER';

    TT.set(key, { value: best, flag });
    return best;
  }

  // ✅ 強制輸出：列出「每個可能棋步」的 minimax 值（depth=SEARCH_DEPTH）
  function logAllMoveScores(scoredMoves, chosen){
    const side = (turn === 'B') ? '黑' : '白';
    appendMoveLine(`== AI分析 ${side}回合 depth=${SEARCH_DEPTH} 候選=${scoredMoves.length} ==`);
    for(const m of scoredMoves){
      const tag = (chosen && m.x===chosen.x && m.y===chosen.y) ? '  <=CHOSEN' : '';
      appendMoveLine(
        `  (${m.x},${m.y})  immediate=${fmtScore(m.immediate)}  minimax=${fmtScore(m.v)}${tag}`
      );
    }
    appendMoveLine(`== end ==`);
  }

  function pickBestAIMove(){
    // 注意：為了「每步都能拿到可比較的真值」，我們對每個候選都用 full window (-Inf, +Inf) 計算一次
    // （alpha-beta 仍會在內層剪枝，但 root 不共享 alpha/beta，避免拿到 bound 值）
    TT.clear();

    const moves = listLegalMoves(board, turn);
    if(moves.length === 0) return null;

    const isMax = (turn === 'B');

    const scored = [];
    for(const m of moves){
      const immediate = evaluateBoard(m.sim.b);

      // full window for exact value
      const v = alphabeta(m.sim.b, m.sim.nextTurn, SEARCH_DEPTH - 1, -Infinity, Infinity);

      scored.push({ x:m.x, y:m.y, immediate, v });
    }

    // 用 minimax 值挑選
    scored.sort((a,b) => isMax ? (b.v - a.v) : (a.v - b.v));

    const best = scored[0];

    // ✅ 強制輸出：每個可能棋步的評值 + 標示選到哪一步
    logAllMoveScores(scored, best);

    return { x: best.x, y: best.y, score: best.v };
  }

  // ===== 走子（動畫版）=====
  async function performMove(){
    if(isAnimating) return;
    if(!selected||!group) return;
    if(group.moverColor!==turn) return;

    isAnimating = true;
    lastMover = turn;

    const above=countAllAbove(selected.x,selected.y);
    const moveAmount=Math.floor(POINTS_PER_TURN/(above+1));
    log(`上方棋子數=${above}，移動量=${moveAmount}`);

    let didMove = false;

    for(let i=0;i<moveAmount;i++){
      if(moveUpStep(group)){
        didMove = true;
        render();
        await sleep(STEP_DELAY);
      } else break;
    }

    let carriedOut = {B:0, W:0};
    let safety = 0;

    while(safety++ < 3000){
      if(frontBlocked(group)){
        while(canMoveDown(group)){
          moveDown1(group);
          didMove = true;
          render();
          await sleep(STEP_DELAY);
        }
        break;
      }

      const res = moveForward1(group);
      if(res.moved) didMove = true;

      carriedOut.B += res.removed.B;
      carriedOut.W += res.removed.W;

      if(res.blocked){
        render();
        await sleep(STEP_DELAY);
        break;
      }
      if(res.borneOff){
        render();
        await sleep(STEP_DELAY);
        break;
      }

      if(!belowOccupiedOrGround(group)){
        moveDown1(group);
        didMove = true;
      }

      render();
      await sleep(STEP_DELAY);

      if(belowOccupiedOrGround(group)) break;
    }

    // ✅ 先判斷終局
    const over1 = checkGameOver(false, lastMover);
    if(over1.over){
      render();
      await sleep(80);
      alert(`${over1.winner==='B'?'黑棋':'白棋'}勝利！`);
      isAnimating = false;
      return;
    }

    const opponent = otherOf(turn);
    const carriedOutOpponent = (opponent==='B') ? carriedOut.B : carriedOut.W;

    // ✅ 棋譜：記錄這手（含 PASS）
    if(didMove) appendMoveLine(`${turn==='B'?'黑':'白'}: (${selected.x},${selected.y})`);
    else       appendMoveLine(`${turn==='B'?'黑':'白'}: PASS`);

    if(carriedOutOpponent > 0){
      await respawnAndDrop(opponent, carriedOutOpponent);

      const over2 = checkGameOver(false, lastMover);
      if(over2.over){
        render();
        await sleep(80);
        alert(`${over2.winner==='B'?'黑棋':'白棋'}勝利！`);
        isAnimating = false;
        return;
      }

      selected = null;
      group = null;
      render();
      isAnimating = false;
      await maybeTriggerAIMove();
      return;
    }

    if(!didMove){
      turn = opponent;
      selected = null;
      group = null;
      render();
      log('此步無法造成任何移動 → PASS 換對方');
      isAnimating = false;
      await maybeTriggerAIMove();
      return;
    }

    turn = opponent;
    selected = null;
    group = null;
    render();
    isAnimating = false;

    await maybeTriggerAIMove();
  }

  // ===== AI 觸發 =====
  async function maybeTriggerAIMove(){
    if(isAnimating) return;

    const over0 = checkGameOver(false, lastMover);
    if(over0.over) return;

    if(!isAI(turn)) return;

    await sleep(AI_THINK_DELAY);
    if(isAnimating || !isAI(turn)) return;

    const over1 = checkGameOver(false, lastMover);
    if(over1.over) return;

    log(`AI 思考中（αβ 深度 ${SEARCH_DEPTH}）...`);

    const mv = pickBestAIMove();

    if(!mv){
      const over2 = checkGameOver(false, lastMover);
      if(over2.over) return;

      appendMoveLine(`${turn==='B'?'黑':'白'}: PASS`);
      turn = otherOf(turn);
      selected = null;
      group = null;
      render();
      log('AI 缺乏有意義棋步 → PASS 換對方');
      await maybeTriggerAIMove();
      return;
    }

    log(`AI 選擇 (${mv.x},${mv.y})，評分=${fmtScore(mv.score)}`);
    selected = {x: mv.x, y: mv.y};
    group = computeGroup(mv.x, mv.y);
    render();
    await sleep(50);
    await performMove();
  }

  // ===== 人類點選 =====
  gridEl.addEventListener('click', async e=>{
    if(isAnimating) return;
    if(isAI(turn)) return;

    const cell=e.target.closest('.cell');
    if(!cell) return;

    const x=Number(cell.dataset.x);
    const y=Number(cell.dataset.y);

    if(board[x][y]!==turn) return;

    selected={x,y};
    group=computeGroup(x,y);
    render();
    await sleep(50);
    await performMove();
  });

  function applyMode(v){
    aiBlack = (v === 'ab' || v === 'aa');
    aiWhite = (v === 'aw' || v === 'aa');
    updateTurnUI();
    render();
    maybeTriggerAIMove();
  }
  modeSel.addEventListener('change', (e)=> applyMode(e.target.value));

  // 搜索深度 slider
  function setDepth(n){
    SEARCH_DEPTH = n;
    depthBadge.textContent = `深度：${n}`;
    log(`搜索深度已設定為 ${n}`);
  }
  depthRange.addEventListener('input', e=> setDepth(Number(e.target.value)));
  setDepth(Number(depthRange.value));

  document.getElementById('btnClearMoves').onclick=()=>{
    movesEl.textContent = '';
  };

  document.getElementById('btnReset').onclick=()=>{
    clearBoard();
    placeInitial();
    turn='B';
    lastMover='B';
    selected=null;
    group=null;
    isAnimating=false;
    log('');
    render();
    maybeTriggerAIMove();
  };

  // init
  clearBoard();
  placeInitial();
  applyMode(modeSel.value);
  render();
})();
</script>
