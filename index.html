<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>小雞棋</title>
  <style>
    :root{
      --cell: 56px;
      --gap: 6px;

      --page-bg: #0f1a14;
      --panel-bg: rgba(255,255,255,0.04);

      --board-bg: #768f5d;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    body{
      margin:0; padding:18px;
      background: var(--page-bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", Arial;
    }

    .wrap{
      display:flex; gap:18px; flex-wrap:wrap;
      align-items:flex-start;
    }

    .panel{
      min-width: 360px;
      background: var(--panel-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 14px 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .title{
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .6px;
      margin-bottom: 10px;
    }

    .row{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
      margin: 8px 0;
    }

    button, select, input[type="range"]{
      background: rgba(56,189,248,0.15);
      border: 1px solid rgba(56,189,248,0.35);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    select{
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      cursor: default;
      font-weight: 650;
    }

    input[type="range"]{
      padding: 0;
      height: 32px;
      width: 170px;
      cursor: pointer;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      color: var(--text);
      font-weight: 900;
    }
    .dot{
      width:10px; height:10px; border-radius:999px;
      background:#94a3b8;
      box-shadow: 0 0 0 3px rgba(148,163,184,0.15);
    }
    .dot.black{ background:#0b1220; box-shadow:0 0 0 3px rgba(11,18,32,0.35); }
    .dot.white{ background:#e5e7eb; box-shadow:0 0 0 3px rgba(229,231,235,0.20); }

    .board{
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, var(--cell));
      grid-template-rows: repeat(12, var(--cell));
      gap: var(--gap);
      background: var(--board-bg);
      padding: var(--gap);
      border-radius: 12px;
    }

    .cell{
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      position: relative;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      overflow:hidden; /* 滿版貼圖 */
    }

    .cell::after{
      content: attr(data-xy);
      position:absolute;
      left:6px; top:6px;
      font-size: 10px;
      color: rgba(148,163,184,0.35);
      pointer-events:none;
    }

    /* ✅ 棋子滿版貼圖 */
    .pieceImg{
      width: var(--cell);
      height: var(--cell);
      object-fit: contain;
      image-rendering: auto;
      user-select:none;
      pointer-events:none;
      /* 若你想要更“堆疊”感，可調整一點點陰影 */
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.35));
    }

    .selOutline{
      outline: 3px solid rgba(56,189,248,0.85);
      outline-offset: -3px;
    }
    .grpGlow{
      box-shadow: 0 0 0 3px rgba(56,189,248,0.35) inset;
    }

    /* 走勢圖 */
    .movesTitle{
      margin-top: 12px;
      font-size: 12px;
      font-weight: 900;
      color: var(--text);
      opacity: .9;
      letter-spacing: .2px;
    }

    .movesBox{
      margin-top: 6px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
      max-height: 320px;
      overflow: auto;
    }

    .chart{
      position: relative;
      width: 100%;
      min-height: 140px;
    }

    .chartCenter{
      position:absolute;
      left:0; right:0;
      top:50%;
      height:1px;
      background: rgba(148,163,184,0.35);
    }

    .chartCols{
      display:flex;
      gap: 6px;
      align-items: center;
      height: 240px;
      padding: 6px 4px;
    }

    .barCol{
      position: relative;
      width: 10px;
      height: 100%;
      border-radius: 6px;
      background: rgba(145,165,185,0.5);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .barMid{
      position:absolute;
      left:0; right:0;
      top:50%;
      height:1px;
      background: rgba(130,155,185,0.5);
    }

    .barUp{
      position:absolute;
      left:0; right:0;
      top:50%;
      transform: translateY(-100%);
      height: 0%;
      background: #0b1220;
    }

    .barDown{
      position:absolute;
      left:0; right:0;
      top:50%;
      height: 0%;
      background: #e5e7eb;
    }

    .chartLegend{
      display:flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(148,163,184,0.85);
      margin-top: 6px;
      user-select: none;
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="board">
    <div id="grid" class="grid"></div>
  </div>

  <div class="panel">
    <div class="title">小雞棋 v4.1 </div>

    <div class="row">
      <span id="turnBadge" class="badge"><span class="dot"></span><span id="turnText">回合</span></span>
    </div>

    <div class="row">
      <label style="font-size:12px;color:var(--muted);font-weight:900;">對戰模式</label>
      <select id="modeSel" title="對戰模式">
        <option value="hh">雙方人類</option>
        <option value="ab">AI 執黑</option>
        <option value="aw">AI 執白</option>
        <option value="aa">雙方 AI</option>
      </select>
    </div>

    <div class="row" style="align-items:center;">
      <label style="font-size:12px;color:var(--muted);font-weight:900;">搜索深度</label>
      <input id="depthRange" type="range" min="1" max="12" step="1" value="6" />
      <span id="depthBadge" class="badge" title="Alpha-Beta 搜索深度">深度：6</span>
    </div>

    <div class="row">
      <button id="btnReset">Reset</button>
      <button id="btnClearMoves" title="清空走勢（不影響盤面）">Clear</button>
    </div>

    <div class="movesTitle">局勢走勢（每手一條，使用 minimax 值）</div>
    <div id="moves" class="movesBox"></div>
  </div>
</div>

<script>
(() => {
  const STEP_DELAY = 100;
  const AI_THINK_DELAY = 150;

  const W = 12;
  const H = 12;
  const POINTS_PER_TURN = 6;

  let SEARCH_DEPTH = 6;

  const INITIAL_PIECES_PER_SIDE = 6;
  const WIN = 1e9;

  // ✅ 規則：連續第 N 次「淨變化 NOOP」（含 PASS）=> 和局（評值強制=0）
  const DRAW_NOOP_N = 5;

  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

  const board = Array.from({length: W+1}, ()=>Array(H+1).fill(null));

  const gridEl = document.getElementById('grid');
  const movesEl = document.getElementById('moves');
  const turnBadgeEl = document.getElementById('turnBadge');
  const turnTextEl = document.getElementById('turnText');
  const modeSel = document.getElementById('modeSel');
  const depthRange = document.getElementById('depthRange');
  const depthBadge = document.getElementById('depthBadge');

  let turn='B';
  let selected=null;
  let group=null;
  let isAnimating=false;

  let aiBlack=false;
  let aiWhite=false;

  // ✅ 兩邊都沒棋 => lastMover 勝
  let lastMover = 'B';

  // ✅ 真實對局：連續 NOOP 計數
  let noopStreak = 0;

  function dirOf(c){ return c==='B'?1:-1; }
  function otherOf(c){ return c==='B'?'W':'B'; }
  function isAI(color){ return (color==='B' && aiBlack) || (color==='W' && aiWhite); }

  // =========================================================
  // ✅ 棋子貼圖狀態（顯示用，不影響規則）
  // =========================================================
  // 狀態：calm / fly / glide / scared
  let activeSelState = 'calm';  // 選定棋狀態
  let activeSelPos = null;      // {x,y} (選定棋目前所在格)
  let activeAbovePos = [];      // [{x,y}...] 選定棋上方群組（在 fly/glide/scared 期間全程 scared）
  const scaredUntil = new Map();// "x,y" -> timestamp (碰撞嚇到 0.5 秒)
  const respawnFalling = new Set();// "x,y" 落下期間全程 scared

  function keyOf(x,y){ return `${x},${y}`; }

  function getPieceSrc(color, state){
    // /assets/B_calm.png ... /assets/W_scared.png
    return `/assets/${color}_${state}.png`;
  }

  function setScaredTemp(x, y, ms){
    const k = keyOf(x,y);
    scaredUntil.set(k, Date.now() + ms);
    // 0.5s 到期後會在 render 時清掉，但這裡也安排一次保險 render
    setTimeout(() => {
      // 如果還在，就讓它自然在下次 render 清掉；這裡做一次 render 讓畫面更新更即時
      render();
    }, ms + 10);
  }

  function syncActiveFromGroup(g){
    if(!g){
      activeSelPos = null;
      activeAbovePos = [];
      return;
    }
    activeSelPos = { x: g.x, y: g.ys[0] };
    activeAbovePos = g.ys.slice(1).map(yy => ({ x: g.x, y: yy }));
  }

  function clearActiveVisual(){
    activeSelState = 'calm';
    activeSelPos = null;
    activeAbovePos = [];
  }

  function getPieceStateAt(x, y){
    const now = Date.now();
    const k = keyOf(x,y);

    // 1) 重生落下：全程 scared
    if(respawnFalling.has(k)) return 'scared';

    // 2) 選定棋
    if(activeSelPos && activeSelPos.x === x && activeSelPos.y === y){
      return activeSelState;
    }

    // 3) 上方群組：在選定棋 fly/glide/scared 期間全程 scared
    if(activeSelState !== 'calm'){
      for(const p of activeAbovePos){
        if(p.x === x && p.y === y) return 'scared';
      }
    }

    // 4) 碰撞嚇到：0.5 秒
    const t = scaredUntil.get(k);
    if(t){
      if(now < t) return 'scared';
      scaredUntil.delete(k);
    }

    return 'calm';
  }

  // 碰撞嚇到的目標：
  // - 優先「前方」(nx, selY)
  // - 若前方無棋，改「前下方」(nx, selY-1)
  // - 即使 y=1 的地面棋也算（本來就會被檢查到）
  function scareCollisionTargetForGroup(g){
    if(!g) return;
    const nx = g.x + dirOf(g.moverColor);
    if(nx < 1 || nx > W) return;

    const selY = g.ys[0];

    if(selY >= 1 && board[nx][selY] !== null){
      setScaredTemp(nx, selY, 500);
      return;
    }
    const fy = selY - 1;
    if(fy >= 1 && board[nx][fy] !== null){
      setScaredTemp(nx, fy, 500);
    }
  }

  // =========================================================
  // 走勢圖 UI
  // =========================================================
  let chartEl=null, colsEl=null;

  function initChart(){
    movesEl.innerHTML = '';
    chartEl = document.createElement('div');
    chartEl.className = 'chart';

    const center = document.createElement('div');
    center.className = 'chartCenter';

    colsEl = document.createElement('div');
    colsEl.className = 'chartCols';

    const legend = document.createElement('div');
    legend.className = 'chartLegend';
    legend.innerHTML = `<span>↑ 黑優勢（AI minimax）</span><span>↓ 白優勢（AI minimax）</span>`;

    chartEl.appendChild(center);
    chartEl.appendChild(colsEl);
    movesEl.appendChild(chartEl);
    movesEl.appendChild(legend);
  }

  // 視覺縮放（WIN 直接滿格）
  const SCALE = 30;
  function scoreToPct(v){
    if(Math.abs(v) >= 9e8) return 100;
    const a = Math.min(SCALE, Math.abs(v));
    return Math.round((a / SCALE) * 100);
  }

  function addBar(score){
    if(!colsEl) initChart();

    const col = document.createElement('div');
    col.className = 'barCol';

    const mid = document.createElement('div');
    mid.className = 'barMid';

    const up = document.createElement('div');
    up.className = 'barUp';

    const down = document.createElement('div');
    down.className = 'barDown';

    const pct = scoreToPct(score);

    if(score > 0){
      up.style.height = pct + '%';
      down.style.height = '0%';
    }else if(score < 0){
      down.style.height = pct + '%';
      up.style.height = '0%';
    }else{
      up.style.height = '0%';
      down.style.height = '0%';
    }

    col.appendChild(mid);
    col.appendChild(up);
    col.appendChild(down);
    colsEl.appendChild(col);

    movesEl.scrollTop = movesEl.scrollHeight;
  }

  function clearChart(){ initChart(); }

  // =========================================================
  // UI
  // =========================================================
  function updateTurnUI(){
    const dot = turnBadgeEl.querySelector('.dot');
    dot.className = 'dot ' + (turn==='B'?'black':'white');
    const side = (turn==='B'?'黑棋':'白棋');
    const aiTag = isAI(turn) ? '（AI）' : '（人類）';
    turnTextEl.textContent = `現在回合：${side}${aiTag}`;
  }

  function render(){
    gridEl.innerHTML='';
    for(let y=H;y>=1;y--){
      for(let x=1;x<=W;x++){
        const d=document.createElement('div');
        d.className='cell';
        d.dataset.x=x;
        d.dataset.y=y;
        d.setAttribute('data-xy',`${x},${y}`);

        const v=board[x][y];
        if(v){
          const state = getPieceStateAt(x,y);
          const img=document.createElement('img');
          img.className='pieceImg';
          img.src = getPieceSrc(v, state);
          img.alt = `${v}_${state}`;
          img.draggable = false;

          if(group && group.x===x && group.ys.includes(y)) d.classList.add('grpGlow');
          d.appendChild(img);
        }

        if(selected && selected.x===x && selected.y===y) d.classList.add('selOutline');
        gridEl.appendChild(d);
      }
    }
    updateTurnUI();
  }

  // =========================================================
  // 基本
  // =========================================================
  function deepCopyBoard(src){ return src.map(col => col.slice()); }

  function posKey(b){
    let s = '';
    for(let y=1;y<=H;y++){
      for(let x=1;x<=W;x++){
        const v = b[x][y];
        s += (v ? v : '.');
      }
      s += '/';
    }
    return s;
  }

  function clearBoard(b = board){
    for(let x=1;x<=W;x++) for(let y=1;y<=H;y++) b[x][y]=null;
  }

  function placeInitial(b = board){
    const blacks=[[1,1],[1,2],[1,3],[2,1],[2,2],[3,1]];
    const whites=[[12,1],[12,2],[12,3],[11,1],[11,2],[10,1]];
    blacks.forEach(([x,y])=>b[x][y]='B');
    whites.forEach(([x,y])=>b[x][y]='W');
  }

  // NOOP 和局
  function resetNoopStreak(){ noopStreak = 0; }

  function bumpNoopStreakAndCheckDraw(showAlert = false){
    noopStreak++;
    if(noopStreak >= DRAW_NOOP_N){
      if(showAlert) alert('和局！');
      return { over:true, draw:true };
    }
    return { over:false, draw:false };
  }

  // =========================================================
  // 規則核心
  // =========================================================
  function computeGroupOn(b, x,y){
    const moverColor=b[x][y];
    if(!moverColor) return null;
    const ys=[];
    for(let yy=y;yy<=H;yy++){
      if(b[x][yy]!==null) ys.push(yy);
      else break;
    }
    return {x,ys,moverColor};
  }
  function computeGroup(x,y){ return computeGroupOn(board, x, y); }

  function countAllAboveOn(b, x,y){
    let c=0;
    for(let yy=y+1;yy<=H;yy++){
      if(b[x][yy]===null) break;
      c++;
    }
    return c;
  }
  function countAllAbove(x,y){ return countAllAboveOn(board, x, y); }

  function moveUpStepOn(b, g){
    const top=g.ys[g.ys.length-1];
    if(top>=H) return false;
    if(b[g.x][top+1]!==null) return false;
    for(let i=g.ys.length-1;i>=0;i--){
      const yy=g.ys[i];
      b[g.x][yy+1]=b[g.x][yy];
      b[g.x][yy]=null;
      g.ys[i]=yy+1;
    }
    return true;
  }
  function moveUpStep(g){ return moveUpStepOn(board, g); }

  function belowOccupiedOrGroundOn(b, g){
    const bottom=g.ys[0];
    if(bottom===1) return true;
    return b[g.x][bottom-1]!==null;
  }
  function belowOccupiedOrGround(g){ return belowOccupiedOrGroundOn(board, g); }

  function canMoveDownOn(b, g){
    const bottom=g.ys[0];
    if(bottom===1) return false;
    return b[g.x][bottom-1]===null;
  }
  function canMoveDown(g){ return canMoveDownOn(board, g); }

  function moveDown1On(b, g){
    for(let i=0;i<g.ys.length;i++){
      const yy=g.ys[i];
      b[g.x][yy-1]=b[g.x][yy];
      b[g.x][yy]=null;
      g.ys[i]=yy-1;
    }
  }
  function moveDown1(g){ return moveDown1On(board, g); }

  // 你原本的 frontBlocked 規則（維持棋規）
  function frontBlockedOn(b, g){
    const nx = g.x + dirOf(g.moverColor);
    if(nx<1 || nx>W) return false;
    for(const yy of g.ys){
      const fy = yy - 1;
      if(fy < 1) continue;
      if(b[nx][fy] !== null) return true;
    }
    return false;
  }
  function frontBlocked(g){ return frontBlockedOn(board, g); }

  function moveForward1On(b, g){
    const nx = g.x + dirOf(g.moverColor);

    if(nx < 1 || nx > W){
      const removed = {B:0, W:0};
      for(const yy of g.ys){
        const c = b[g.x][yy];
        if(c === 'B') removed.B++;
        if(c === 'W') removed.W++;
        b[g.x][yy] = null;
      }
      g.x = nx;
      return { borneOff:true, removed, blocked:false, moved:true };
    }

    for(const yy of g.ys){
      if(b[nx][yy] !== null){
        return { borneOff:false, removed:{B:0, W:0}, blocked:true, moved:false };
      }
    }

    for(const yy of g.ys) b[nx][yy] = b[g.x][yy];
    for(const yy of g.ys) b[g.x][yy] = null;
    g.x = nx;

    return { borneOff:false, removed:{B:0, W:0}, blocked:false, moved:true };
  }
  function moveForward1(g){ return moveForward1On(board, g); }

  function playerHasPiecesOn(b, color){
    for(let x=1;x<=W;x++){
      for(let y=1;y<=H;y++){
        if(b[x][y] === color) return true;
      }
    }
    return false;
  }

  // 評值（黑視角）
  function evaluateBoard(b){
    let blackOn = 0, whiteOn = 0;
    let blackScore = 0, whiteScore = 0;

    for(let x=1;x<=W;x++){
      for(let y=1;y<=H;y++){
        const v = b[x][y];
        if(v === 'B'){
          blackOn++;
          blackScore += Math.min(14, x + y);
        } else if(v === 'W'){
          whiteOn++;
          const mirroredX = (W + 1) - x;
          whiteScore += Math.min(14, mirroredX + y);
        }
      }
    }

    const blackOff = INITIAL_PIECES_PER_SIDE - blackOn;
    const whiteOff = INITIAL_PIECES_PER_SIDE - whiteOn;
    blackScore += 14 * Math.max(0, blackOff);
    whiteScore += 14 * Math.max(0, whiteOff);

    return blackScore - whiteScore;
  }

  // =========================================================
  // 模擬走子（AI 搜索用）— 已包含「先重生再判終局」修正
  // =========================================================
  function simulateMoveFrom(b0, x, y, turnColor){
    if(b0[x][y] !== turnColor) return { ok:false };

    const beforeKey = posKey(b0);

    const b = deepCopyBoard(b0);
    const g = computeGroupOn(b, x, y);
    if(!g) return { ok:false };

    const above = countAllAboveOn(b, x, y);
    const moveAmount = Math.floor(POINTS_PER_TURN / (above + 1));

    for(let i=0;i<moveAmount;i++){
      if(!moveUpStepOn(b, g)) break;
    }

    let carriedOut = {B:0, W:0};
    let safety = 0;

    while(safety++ < 3000){
      if(frontBlockedOn(b, g)){
        while(canMoveDownOn(b, g)){
          moveDown1On(b, g);
        }
        break;
      }

      const res = moveForward1On(b, g);

      carriedOut.B += res.removed.B;
      carriedOut.W += res.removed.W;

      if(res.blocked) break;
      if(res.borneOff) break;

      if(!belowOccupiedOrGroundOn(b, g)){
        moveDown1On(b, g);
      }

      if(belowOccupiedOrGroundOn(b, g)) break;
    }

    const opponent = otherOf(turnColor);
    const carriedOutOpponent = (opponent==='B') ? carriedOut.B : carriedOut.W;

    // ✅ 先重生（有重生 => 自己再走一次）
    if(carriedOutOpponent > 0){
      const spawnX = (opponent==='B') ? 1 : 12;
      for(let k=0; k<carriedOutOpponent; k++){
        let yy = H - k;
        while(yy >= 1 && b[spawnX][yy] !== null) yy--;
        if(yy < 1) break;
        b[spawnX][yy] = opponent;
        while(yy > 1 && b[spawnX][yy-1] === null){
          b[spawnX][yy-1] = b[spawnX][yy];
          b[spawnX][yy] = null;
          yy--;
        }
      }
      const changed = (posKey(b) !== beforeKey);
      return { ok:true, b, nextTurn: turnColor, carriedOutOpponent, changed, lastMover: turnColor };
    }

    // ✅ 沒重生才判終局
    const bHas = playerHasPiecesOn(b, 'B');
    const wHas = playerHasPiecesOn(b, 'W');

    if(!bHas || !wHas){
      let winner = null;
      if(!bHas && wHas) winner = 'B';
      else if(!wHas && bHas) winner = 'W';
      else winner = turnColor;

      const changed = (posKey(b) !== beforeKey);
      return { ok:true, b, nextTurn: turnColor, winner, carriedOutOpponent: 0, changed, lastMover: turnColor };
    }

    const changed = (posKey(b) !== beforeKey);
    return { ok:true, b, nextTurn: opponent, carriedOutOpponent: 0, changed, lastMover: turnColor };
  }

  function listLegalMoves(b, turnColor){
    const moves = [];
    for(let x=1;x<=W;x++){
      for(let y=1;y<=H;y++){
        if(b[x][y] !== turnColor) continue;
        const sim = simulateMoveFrom(b, x, y, turnColor);
        if(sim.ok) moves.push({ x, y, sim });
      }
    }
    return moves;
  }

  // =========================================================
  // Alpha-Beta（AI：終局追求 evaluateBoard 最大；不看勝負步數）
  // =========================================================
  const TT = new Map();
  const EPS_TE = 1e-3;

  function boardKey(b, turnColor, depth, lastMoverKey, noopStreakKey){
    let s = turnColor + '|' + lastMoverKey + '|' + noopStreakKey + '|' + depth + '|';
    for(let y=1;y<=H;y++){
      for(let x=1;x<=W;x++){
        const v = b[x][y];
        s += (v ? v : '.');
      }
      s += '/';
    }
    return s;
  }

  function alphabeta(b, turnColor, depth, alpha, beta, lastMoverAB, noopStreakAB){
    if(noopStreakAB >= DRAW_NOOP_N) return 0;

    const blackHas = playerHasPiecesOn(b, 'B');
    const whiteHas = playerHasPiecesOn(b, 'W');

    if(!blackHas && whiteHas) return (WIN + evaluateBoard(b) * EPS_TE);
    if(!whiteHas && blackHas) return (-WIN + evaluateBoard(b) * EPS_TE);
    if(!blackHas && !whiteHas){
      const base = (lastMoverAB === 'B') ? WIN : -WIN;
      return (base + evaluateBoard(b) * EPS_TE);
    }

    if(depth === 0) return evaluateBoard(b);

    const alpha0 = alpha, beta0 = beta;
    const key = boardKey(b, turnColor, depth, lastMoverAB, noopStreakAB);
    const hit = TT.get(key);

    if(hit){
      if(hit.flag === 'EXACT') return hit.value;
      if(hit.flag === 'LOWER') alpha = Math.max(alpha, hit.value);
      if(hit.flag === 'UPPER') beta  = Math.min(beta, hit.value);
      if(alpha >= beta) return hit.value;
    }

    const moves = listLegalMoves(b, turnColor);

    if(moves.length === 0){
      const v = alphabeta(b, otherOf(turnColor), depth - 1, alpha, beta, turnColor, noopStreakAB + 1);
      TT.set(key, { value: v, flag: 'EXACT' });
      return v;
    }

    const isMax = (turnColor === 'B');

    for(const m of moves) m.order = evaluateBoard(m.sim.b);
    moves.sort((a,b2) => isMax ? (b2.order - a.order) : (a.order - b2.order));

    let best = isMax ? -Infinity : Infinity;

    for(const m of moves){
      const nextNoop = m.sim.changed ? 0 : (noopStreakAB + 1);

      const v = alphabeta(
        m.sim.b,
        m.sim.nextTurn,
        depth - 1,
        alpha,
        beta,
        m.sim.lastMover,
        nextNoop
      );

      if(isMax){
        if(v > best) best = v;
        alpha = Math.max(alpha, best);
        if(alpha >= beta) break;
      } else {
        if(v < best) best = v;
        beta = Math.min(beta, best);
        if(alpha >= beta) break;
      }
    }

    let flag = 'EXACT';
    if(best <= alpha0) flag = 'UPPER';
    else if(best >= beta0) flag = 'LOWER';

    TT.set(key, { value: best, flag });
    return best;
  }

  // 走勢圖用 alphabetaEx（平滑顯示）
  function alphabetaEx(b, turnColor, depth, alpha, beta, lastMoverAB, noopStreakAB){
    const WIN_TH = 9e8;

    if(noopStreakAB >= DRAW_NOOP_N){
      return { v: 0, terminalEval: 0 };
    }

    const blackHas = playerHasPiecesOn(b, 'B');
    const whiteHas = playerHasPiecesOn(b, 'W');

    if(!blackHas && whiteHas){
      return { v: (WIN + depth), terminalEval: evaluateBoard(b) };
    }
    if(!whiteHas && blackHas){
      return { v: (-WIN - depth), terminalEval: evaluateBoard(b) };
    }
    if(!blackHas && !whiteHas){
      const v = (lastMoverAB === 'B') ? (WIN + depth) : (-WIN - depth);
      return { v, terminalEval: evaluateBoard(b) };
    }

    if(depth === 0){
      const e = evaluateBoard(b);
      return { v: e, terminalEval: null };
    }

    const moves = listLegalMoves(b, turnColor);

    if(moves.length === 0){
      return alphabetaEx(b, otherOf(turnColor), depth - 1, alpha, beta, turnColor, noopStreakAB + 1);
    }

    const isMax = (turnColor === 'B');

    for(const m of moves) m.order = evaluateBoard(m.sim.b);
    moves.sort((a,b2) => isMax ? (b2.order - a.order) : (a.order - b2.order));

    let bestV = isMax ? -Infinity : Infinity;
    let bestTE = null;

    function better(aV, aTE, bV, bTE){
      if(isMax){
        if(aV > bV) return true;
        if(aV < bV) return false;
      }else{
        if(aV < bV) return true;
        if(aV > bV) return false;
      }

      if(Math.abs(aV) >= WIN_TH && Math.abs(bV) >= WIN_TH){
        if(aV > 0){
          return (aTE ?? -Infinity) > (bTE ?? -Infinity);
        }else if(aV < 0){
          return (aTE ?? Infinity) < (bTE ?? Infinity);
        }
      }
      return false;
    }

    for(const m of moves){
      const nextNoop = m.sim.changed ? 0 : (noopStreakAB + 1);

      const r = alphabetaEx(
        m.sim.b,
        m.sim.nextTurn,
        depth - 1,
        alpha,
        beta,
        m.sim.lastMover,
        nextNoop
      );

      const aV = r.v;
      const aTE = r.terminalEval;

      if(bestTE === null && bestV === (isMax ? -Infinity : Infinity)){
        bestV = aV;
        bestTE = aTE;
      }else if(better(aV, aTE, bestV, bestTE)){
        bestV = aV;
        bestTE = aTE;
      }

      if(isMax){
        alpha = Math.max(alpha, bestV);
        if(alpha >= beta) break;
      }else{
        beta = Math.min(beta, bestV);
        if(alpha >= beta) break;
      }
    }

    return { v: bestV, terminalEval: bestTE };
  }

  // 每步都畫 + 白少算一步（只影響畫圖）
  function chartDepth(){
    let d = SEARCH_DEPTH;
    if(d < 6) d = 6;
    if(d % 2 === 1){ d += 1; }
    if(turn === 'W'){ d -= 1; }
    return d;
  }

  function computeChartScoreNow(){
    const D = chartDepth();
    TT.clear();

    const r = alphabetaEx(board, turn, D, -Infinity, Infinity, lastMover, noopStreak);

    if(Math.abs(r.v) >= 9e8 && r.terminalEval !== null){
      return r.terminalEval;
    }
    return r.v;
  }

  function pushChartPoint(){
    addBar(computeChartScoreNow());
  }

  // AI 選步
  function pickBestAIMove(){
    TT.clear();
    const moves = listLegalMoves(board, turn);
    if(moves.length === 0) return null;

    const isMax = (turn === 'B');
    const scored = [];

    for(const m of moves){
      const nextNoop = m.sim.changed ? 0 : (noopStreak + 1);
      const v = alphabeta(
        m.sim.b,
        m.sim.nextTurn,
        SEARCH_DEPTH - 1,
        -Infinity,
        Infinity,
        m.sim.lastMover,
        nextNoop
      );
      scored.push({ x: m.x, y: m.y, v });
    }

    scored.sort((a,b) => isMax ? (b.v - a.v) : (a.v - b.v));
    return { x: scored[0].x, y: scored[0].y, score: scored[0].v };
  }

  // 終局判定（真實對局 alert）
  function checkGameOver(showAlert = false, moverColor = null){
    const blackHas = playerHasPiecesOn(board, 'B');
    const whiteHas = playerHasPiecesOn(board, 'W');

    if(!blackHas && whiteHas){
      if(showAlert) alert('黑棋勝利！');
      return { over:true, winner:'B' };
    }
    if(!whiteHas && blackHas){
      if(showAlert) alert('白棋勝利！');
      return { over:true, winner:'W' };
    }
    if(!blackHas && !whiteHas){
      const w = moverColor || lastMover || 'B';
      if(showAlert) alert(`${w==='B'?'黑棋':'白棋'}勝利！`);
      return { over:true, winner:w };
    }
    return { over:false, winner:null };
  }

  // =========================================================
  // 重生/下落（真實對局）— 落下全程 scared
  // =========================================================
  async function dropPieceAt(x, y){
    // 這顆棋在落下期間全程 scared（位置會變）
    let k = keyOf(x,y);
    respawnFalling.add(k);

    while(y>1 && board[x][y-1]===null){
      // move down by 1
      board[x][y-1] = board[x][y];
      board[x][y] = null;

      // update falling key
      respawnFalling.delete(k);
      y = y-1;
      k = keyOf(x,y);
      respawnFalling.add(k);

      render();
      await sleep(STEP_DELAY);
    }

    respawnFalling.delete(k);
  }

  async function respawnAndDrop(color, count){
    if(count<=0) return;
    const spawnX = (color==='B') ? 1 : 12;
    for(let k=0; k<count; k++){
      let targetY = H - k;
      while(targetY >= 1 && board[spawnX][targetY] !== null) targetY--;
      if(targetY < 1) break;

      board[spawnX][targetY] = color;
      render();
      await sleep(STEP_DELAY);
      await dropPieceAt(spawnX, targetY);
    }
  }

  // =========================================================
  // 真實走子（動畫 + 貼圖狀態）
  // =========================================================
  async function performMove(){
    if(isAnimating) return;
    if(!selected||!group) return;
    if(group.moverColor!==turn) return;

    isAnimating = true;

    const beforeKey = posKey(board);
    lastMover = turn;

    // ✅ 進入動作：初始化顯示狀態
    syncActiveFromGroup(group);
    activeSelState = 'fly';
    render();
    await sleep(10);

    const above=countAllAbove(selected.x,selected.y);
    const moveAmount=Math.floor(POINTS_PER_TURN/(above+1));

    // 1) 上升（fly）— 每一步都 render，確保 fly 看得到
    for(let i=0;i<moveAmount;i++){
      if(moveUpStep(group)){
        syncActiveFromGroup(group);
        render();
        await sleep(STEP_DELAY);
      } else break;
    }

    // 2) 前進/下落（glide 或 scared）
    activeSelState = 'glide';
    syncActiveFromGroup(group);
    render();                  // ✅ 進入 glide 先 render 一次，保證看得到
    await sleep(STEP_DELAY);

    let carriedOut = {B:0, W:0};
    let safety = 0;

    while(safety++ < 3000){
      // ✅ 碰撞判定（維持你原棋規 frontBlocked）
      if(frontBlocked(group)){
        // 碰撞：選定棋在落下期間全程 scared；上方群組仍依規則 scared
        activeSelState = 'scared';
        syncActiveFromGroup(group);

        // 0.5s scared 目標
        scareCollisionTargetForGroup(group);

        // 落下（全程 scared）
        while(canMoveDown(group)){
          moveDown1(group);
          syncActiveFromGroup(group);
          render();
          await sleep(STEP_DELAY);
        }
        break;
      }

      // ✅ glide 期間的移動單位：向前 ->（不 render）-> 向下判定 -> render
      const res = moveForward1(group);

      carriedOut.B += res.removed.B;
      carriedOut.W += res.removed.W;

      if(res.blocked){
        // moveForward1 的正面阻擋（同 y 有棋）也算碰撞：0.5s scared 前方/前下方
        activeSelState = 'scared';
        syncActiveFromGroup(group);
        scareCollisionTargetForGroup(group);
        render();
        await sleep(STEP_DELAY);
        break;
      }
      if(res.borneOff){
        syncActiveFromGroup(group);
        render();
        await sleep(STEP_DELAY);
        break;
      }

      // forward 後不 render（符合你要求）
      // 接著直接做向下判定，並只在 unit 結束 render
      if(!belowOccupiedOrGround(group)){
        moveDown1(group);
      }

      syncActiveFromGroup(group);
      render();
      await sleep(STEP_DELAY);

      if(belowOccupiedOrGround(group)) break;
    }

    const opponent = otherOf(turn);
    const carriedOutOpponent = (opponent==='B') ? carriedOut.B : carriedOut.W;

    // ✅ 若對手棋子被推出場外 -> 先重生（落下全程 scared）
    let keepTurn = false;
    if(carriedOutOpponent > 0){
      await respawnAndDrop(opponent, carriedOutOpponent);
      keepTurn = true; // 推出對手並重生 => 自己再走一次
    }

    // ✅ 重生完成後，再判勝負（以最終盤面為準）
    const over = checkGameOver(false, lastMover);
    if(over.over){
      // 動作結束：清狀態（避免結束畫面還停留 fly/glide/scared）
      clearActiveVisual();
      render();
      await sleep(50);
      alert(`${over.winner==='B'?'黑棋':'白棋'}勝利！`);
      isAnimating = false;
      return;
    }

    // ✅ NOOP streak（以最終盤面含重生後判淨變化）
    const finalKey = posKey(board);
    const netChanged = (finalKey !== beforeKey);

    if(!netChanged){
      const dr = bumpNoopStreakAndCheckDraw(true);
      if(dr.over){
        clearActiveVisual();
        render();
        isAnimating = false;
        return;
      }
    } else {
      resetNoopStreak();
    }

    // ✅ 換手規則：只有在「沒有重生獎勵回合」才換手
    if(!keepTurn){
      turn = opponent;
    }

    selected = null;
    group = null;

    // ✅ 動作結束：狀態回 calm
    clearActiveVisual();
    render();

    // 每步都畫
    pushChartPoint();

    isAnimating = false;
    await maybeTriggerAIMove();
  }

  // =========================================================
  // AI 觸發
  // =========================================================
  async function maybeTriggerAIMove(){
    if(isAnimating) return;

    const over0 = checkGameOver(false, lastMover);
    if(over0.over) return;
    if(noopStreak >= DRAW_NOOP_N) return;
    if(!isAI(turn)) return;

    await sleep(AI_THINK_DELAY);
    if(isAnimating || !isAI(turn)) return;

    const over1 = checkGameOver(false, lastMover);
    if(over1.over) return;
    if(noopStreak >= DRAW_NOOP_N) return;

    const mv = pickBestAIMove();

    if(!mv){
      // PASS：換手 + NOOP
      lastMover = turn;
      const dr = bumpNoopStreakAndCheckDraw(true);

      turn = otherOf(turn);
      selected = null; group = null;

      clearActiveVisual();
      render();

      // PASS 也算一步
      pushChartPoint();

      if(dr.over) return;
      await maybeTriggerAIMove();
      return;
    }

    selected = {x: mv.x, y: mv.y};
    group = computeGroup(mv.x, mv.y);

    // 顯示選定框一下
    render();
    await sleep(50);

    await performMove();
  }

  // =========================================================
  // 人類點選
  // =========================================================
  gridEl.addEventListener('click', async e=>{
    if(isAnimating) return;
    if(isAI(turn)) return;

    const cell=e.target.closest('.cell');
    if(!cell) return;

    const x=Number(cell.dataset.x);
    const y=Number(cell.dataset.y);

    if(board[x][y]!==turn) return;

    selected={x,y};
    group=computeGroup(x,y);

    render();
    await sleep(50);

    await performMove();
  });

  function applyMode(v){
    aiBlack = (v === 'ab' || v === 'aa');
    aiWhite = (v === 'aw' || v === 'aa');
    updateTurnUI();
    render();
    maybeTriggerAIMove();
  }
  modeSel.addEventListener('change', (e)=> applyMode(e.target.value));

  function setDepth(n){
    SEARCH_DEPTH = n;
    depthBadge.textContent = `深度：${n}`;
  }
  depthRange.addEventListener('input', e=> setDepth(Number(e.target.value)));
  setDepth(Number(depthRange.value));

  document.getElementById('btnClearMoves').onclick=()=>{
    clearChart();
    pushChartPoint();
  };

  document.getElementById('btnReset').onclick=()=>{
    clearBoard();
    placeInitial();
    turn='B';
    lastMover='B';
    selected=null;
    group=null;
    isAnimating=false;

    resetNoopStreak();
    TT.clear();
    scaredUntil.clear();
    respawnFalling.clear();
    clearActiveVisual();

    clearChart();
    render();
    pushChartPoint();
    maybeTriggerAIMove();
  };

  // =========================================================
  // init
  // =========================================================
  function preloadPieces(){
    const states = ['calm','fly','glide','scared'];
    const colors = ['B','W'];
    for(const c of colors){
      for(const s of states){
        const img = new Image();
        img.src = getPieceSrc(c, s);
      }
    }
  }

  clearBoard();
  placeInitial();
  applyMode(modeSel.value);
  resetNoopStreak();
  initChart();
  preloadPieces();
  render();
  pushChartPoint();
})();
</script>
